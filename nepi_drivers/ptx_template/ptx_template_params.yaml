# PTX (Pan-Tilt) DRIVER TEMPLATE -- PARAMS / MANIFEST
# See lsx_template/lsx_template_params.yaml for the annotated field reference.

driver:
  pkg_name: PTX_TEMPLATE
  display_name: Template Pan-Tilt
  description: Example serial PTX pan-tilt driver template
  type: PTX
  group_id: None

  NODE_DICT:
    file_name: ptx_template_node.py
    class_name: PtxTemplateNode

  DRIVER_DICT:
    file_name: None
    class_name: None

  DISCOVERY_DICT:
    file_name: ptx_template_discovery.py
    class_name: PtxTemplateDiscovery
    process: CALL
    OPTIONS:
      baud_rate:
        type: Discrete
        options:
          - All
          - '2400'
          - '9600'
          - '19200'
          - '38400'
          - '57600'
          - '115200'
        default: '9600'
        value: '9600'
      start_addr:
        type: 'String'
        default: 'A'
        value: 'A'
      stop_addr:
        type: 'String'
        default: 'B'
        value: 'B'
